<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<link rel="stylesheet" href="styles/small.css">
<link rel="stylesheet" href="styles/larger.css">
</head>

<body>

<header>
<h1>Thank You for Joining</h1>
</header>

<main>
<div class="thankyou-card">
<h3>Submission Details</h3>

<p><strong>First Name:</strong> <span id="first"></span></p>
<p><strong>Last Name:</strong> <span id="last"></span></p>
<p><strong>Email:</strong> <span id="email"></span></p>
<p><strong>Phone:</strong> <span id="phone"></span></p>
<p><strong>Organization:</strong> <span id="org"></span></p>
<p><strong>Timestamp:</strong> <span id="time"></span></p>
</div>
</main>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("first").textContent = params.get("fname");
document.getElementById("last").textContent = params.get("lname");
document.getElementById("email").textContent = params.get("email");
document.getElementById("phone").textContent = params.get("phone");
document.getElementById("org").textContent = params.get("orgname");
document.getElementById("time").textContent = params.get("timestamp");
</script>

</body>
</html>
